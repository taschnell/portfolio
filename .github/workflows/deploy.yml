name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build site
        run: yarn build
        env:
          # Set these as repository variables (Settings → Variables) to override.
          # ASTRO_SITE: full URL of deployed site, e.g. https://username.github.io
          # ASTRO_BASE: base path for project pages, e.g. /repo-name (leave unset for user pages)
          ASTRO_SITE: ${{ vars.ASTRO_SITE || 'https://teoschnell.com' }}
          ASTRO_BASE: ${{ vars.ASTRO_BASE || '' }}

      - name: Commit updated citations.yml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/citations.yml
          if git diff --cached --quiet; then
            echo "No citation changes to commit."
          else
            git commit -m "chore: update citation counts [skip ci]"
            git push
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
